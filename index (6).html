<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSW Logistic Tracker</title>
<style>
  :root {
    --bg: #f5f4f0; --card: #ffffff; --border: rgba(0,0,0,0.10);
    --text: #1a1a19; --muted: #6b6b67; --hint: #9a9994;
    --red-bg: #fce8e8; --red-tx: #7a1f1f;
    --amber-bg: #fdf3dc; --amber-tx: #5a3606;
    --blue-bg: #e6f1fb; --blue-tx: #0c447c;
    --green-bg: #eaf3de; --green-tx: #27500a;
    --gray-bg: #f0eee8; --gray-tx: #444441;
    --pink-bg: #fbeaf0; --pink-tx: #72243e;
    --teal-bg: #e1f5ee; --teal-tx: #085041;
    --radius: 12px; --sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b19; --card: #252420; --border: rgba(255,255,255,0.10);
      --text: #e8e6de; --muted: #9a9890; --hint: #6a6860;
      --red-bg: #3d1414; --red-tx: #f09595;
      --amber-bg: #3a2608; --amber-tx: #fac775;
      --blue-bg: #0a2640; --blue-tx: #85b7eb;
      --green-bg: #152808; --green-tx: #c0dd97;
      --gray-bg: #2a2926; --gray-tx: #d3d1c7;
      --pink-bg: #2e0f1d; --pink-tx: #f4c0d1;
      --teal-bg: #04342c; --teal-tx: #9fe1cb;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.6; }

  header { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  #last-refresh { font-size: 12px; color: var(--hint); }
  main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--sm); padding: 14px 16px; }
  .stat-val { font-size: 24px; font-weight: 600; line-height: 1; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* transit days summary cards */
  .transit-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .transit-card { background: var(--teal-bg); border: 0.5px solid rgba(0,0,0,.06); border-radius: var(--sm); padding: 14px 16px; }
  .transit-card .tc-val { font-size: 26px; font-weight: 700; color: var(--teal-tx); line-height: 1; }
  .transit-card .tc-lbl { font-size: 12px; color: var(--teal-tx); opacity: .75; margin-top: 4px; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .pill { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .search { flex: 1; min-width: 160px; max-width: 320px; padding: 6px 12px; border: 0.5px solid var(--border); border-radius: 20px; background: var(--card); color: var(--text); font-size: 13px; outline: none; }
  .search:focus { border-color: var(--muted); }

  .table-wrap { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--hint); padding: 10px 14px; text-align: left; border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; background: var(--card); white-space: nowrap; }
  th:hover { color: var(--muted); }
  th .sa { margin-left: 3px; opacity: .4; }
  th.sorted .sa { opacity: 1; }
  td { padding: 11px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* transit days cell — colour-coded */
  .days-pill { display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
  .days-fast { background: var(--green-bg); color: var(--green-tx); }
  .days-med  { background: var(--amber-bg); color: var(--amber-tx); }
  .days-slow { background: var(--red-bg);   color: var(--red-tx); }
  .days-na   { background: var(--gray-bg);  color: var(--gray-tx); }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .b-delay   { background: var(--red-bg);   color: var(--red-tx); }
  .b-transit { background: var(--amber-bg); color: var(--amber-tx); }
  .b-deliver { background: var(--green-bg); color: var(--green-tx); }
  .b-clear   { background: var(--blue-bg);  color: var(--blue-tx); }
  .b-update  { background: var(--pink-bg);  color: var(--pink-tx); }
  .b-default { background: var(--gray-bg);  color: var(--gray-tx); }

  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .tab { font-size: 13px; padding: 8px 18px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: all .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  .fedex-link { color: var(--muted); font-size: 12px; font-family: monospace; }
  .fedex-link:hover { color: var(--text); text-decoration: underline; }

  #loader, #error-msg { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
  #error-msg { color: var(--red-tx); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; }
  .refresh-btn:hover { background: var(--card); color: var(--text); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }

  #transit-summary { display: none; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 16px 12px; }
  }
</style>
</head>

<main>
  <div class="stats" id="stats-bar"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('active', this)">Active shipments</button>
    <button class="tab" onclick="switchTab('delivered', this)">Delivered</button>
  </div>

  <!-- Transit day summary — shown only on Delivered tab -->
  <div id="transit-summary">
    <div class="transit-summary" id="transit-cards"></div>
  </div>

  <div class="toolbar">
    <input class="search" id="search" type="text" placeholder="Search tracking #, part, location…" oninput="render()">
    <div id="filter-pills">
      <button class="pill active" onclick="setFilter('all', this)">All</button>
      <button class="pill" onclick="setFilter('delay', this)">Clearance delay</button>
      <button class="pill" onclick="setFilter('clear', this)">In clearance</button>
      <button class="pill" onclick="setFilter('transit', this)">In transit</button>
    </div>
  </div>

  <div id="loader"><span class="spinner"></span>Loading shipments…</div>
  <div id="error-msg" style="display:none"></div>

  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="empty-msg" style="display:none; text-align:center; padding:40px; color:var(--muted);">No shipments match your filter.</div>
</main>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  REPLACE THIS with your Apps Script Web App URL         ║
// ╚══════════════════════════════════════════════════════════╝
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxUML4ruBz9XwfgPBDobKBcbCDLZUwZdnw1obWUmMMz5wS7ADsjOx2TF6fhlTYz5Z7s/exec";

let allData = { active: [], delivered: [] };
let activeTab = "active";
let activeFilter = "all";
let sortKey = "status";
let sortDir = 1;

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  document.getElementById("loader").style.display = "block";
  document.getElementById("table-wrap").style.display = "none";
  document.getElementById("error-msg").style.display = "none";
  document.getElementById("empty-msg").style.display = "none";
  try {
    const res = await fetch(SHEET_API_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    allData = await res.json();
    document.getElementById("last-refresh").textContent = "Updated " + new Date(allData.ts).toLocaleTimeString();
    buildStats();
    render();
  } catch(e) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("error-msg").style.display = "block";
    document.getElementById("error-msg").textContent = "Could not load data: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

function buildStats() {
  const rows = allData.active || [];
  const delivered = allData.delivered || [];
  const count = (fn) => rows.filter(fn).length;
  const days = delivered.map(r => transitDays(r)).filter(d => d !== null);
  const avgDays = days.length ? Math.round(days.reduce((a,b)=>a+b,0)/days.length) : null;

  document.getElementById("stats-bar").innerHTML = [
    [rows.length,      "Active shipments"],
    [count(r => /delay|exception|failure/i.test(r.status+" "+r.event)), "Clearance delays"],
    [count(r => /clearance in progress/i.test(r.event)), "In clearance"],
    [delivered.length, "Delivered"],
    [avgDays !== null ? avgDays + " days" : "—", "Avg transit time"],
  ].map(([v,l]) => `<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join("");
}

// Returns integer transit days or null
function transitDays(r) {
  if (!r.shipDate) return null;
  const ship = parseDate(r.shipDate);
  if (!ship) return null;
  const deliv = parseDate(r.actualDelivery) || parseDate(r.updated) || new Date();
  const diff = Math.round((deliv - ship) / 86400000);
  return diff >= 0 ? diff : null;
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function daysPillClass(d) {
  if (d === null) return "days-na";
  if (d <= 7)  return "days-fast";
  if (d <= 14) return "days-med";
  return "days-slow";
}

function buildTransitSummary(rows) {
  const days = rows.map(r => transitDays(r)).filter(d => d !== null);
  if (!days.length) {
    document.getElementById("transit-summary").style.display = "none";
    return;
  }
  const sum = days.reduce((a,b)=>a+b,0);
  const avg = Math.round(sum / days.length);
  const min = Math.min(...days);
  const max = Math.max(...days);
  const fastest = rows.find(r => transitDays(r) === min);
  const slowest = rows.find(r => transitDays(r) === max);

  document.getElementById("transit-cards").innerHTML = `
    <div class="transit-card"><div class="tc-val">${avg}</div><div class="tc-lbl">Avg transit days</div></div>
    <div class="transit-card"><div class="tc-val">${min}</div><div class="tc-lbl">Fastest · ${fastest ? fastest.part||fastest.tracking : ""}</div></div>
    <div class="transit-card"><div class="tc-val">${max}</div><div class="tc-lbl">Slowest · ${slowest ? slowest.part||slowest.tracking : ""}</div></div>
    <div class="transit-card"><div class="tc-val">${days.length}</div><div class="tc-lbl">With ship date data</div></div>
  `;
  document.getElementById("transit-summary").style.display = "block";
}

function switchTab(tab, el) {
  activeTab = tab;
  activeFilter = "all";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  // swap filter pills
  const fp = document.getElementById("filter-pills");
  if (tab === "delivered") {
    fp.innerHTML = `<button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill" onclick="setFilter('fast',this)">Fast (&le;7 days)</button>
      <button class="pill" onclick="setFilter('med',this)">Medium (8-14)</button>
      <button class="pill" onclick="setFilter('slow',this)">Slow (15+)</button>`;
  } else {
    fp.innerHTML = `<button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill" onclick="setFilter('delay',this)">Clearance delay</button>
      <button class="pill" onclick="setFilter('clear',this)">In clearance</button>
      <button class="pill" onclick="setFilter('transit',this)">In transit</button>`;
    document.getElementById("transit-summary").style.display = "none";
  }
  sortKey = tab === "delivered" ? "transitDays" : "status";
  sortDir = tab === "delivered" ? 1 : 1;
  render();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  render();
}

function badgeClass(status, event) {
  const s = (status + " " + event).toLowerCase();
  if (/delay|exception|failure|undeliverable|cancel/i.test(s)) return "b-delay";
  if (/clearance in progress/i.test(s)) return "b-clear";
  if (/delivered/i.test(s)) return "b-deliver";
  if (/in transit|out for delivery|on vehicle|at fedex|picked up/i.test(s)) return "b-transit";
  if (/delivery updated|update/i.test(s)) return "b-update";
  return "b-default";
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render() {
  const src = activeTab === "active" ? allData.active : allData.delivered;
  let rows = [...(src || [])];
  const q = document.getElementById("search").value.toLowerCase().trim();

  rows = rows.filter(r => {
    if (q && !Object.values(r).join(" ").toLowerCase().includes(q)) return false;
    if (activeFilter === "all") return true;
    const combo = (r.status + " " + r.event).toLowerCase();
    if (activeFilter === "delay")   return /delay|exception|failure|undeliverable|cancel/.test(combo);
    if (activeFilter === "clear")   return /clearance in progress/.test(combo);
    if (activeFilter === "transit") return /in transit|out for delivery|on vehicle|at fedex|picked up/.test(combo);
    const d = transitDays(r);
    if (activeFilter === "fast") return d !== null && d <= 7;
    if (activeFilter === "med")  return d !== null && d >= 8 && d <= 14;
    if (activeFilter === "slow") return d !== null && d >= 15;
    return true;
  });

  // Sort
  rows.sort((a, b) => {
    let av, bv;
    if (sortKey === "transitDays") {
      av = transitDays(a) ?? 9999;
      bv = transitDays(b) ?? 9999;
      return (av - bv) * sortDir;
    }
    av = String(a[sortKey]||"").toLowerCase();
    bv = String(b[sortKey]||"").toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById("loader").style.display = "none";
  const wrap = document.getElementById("table-wrap");
  const empty = document.getElementById("empty-msg");

  if (!rows.length) { wrap.style.display="none"; empty.style.display="block"; document.getElementById("transit-summary").style.display="none"; return; }
  wrap.style.display = "block"; empty.style.display = "none";

  const fedexBase = "https://www.fedex.com/fedextrack/?trknbr=";

  if (activeTab === "delivered") {
    buildTransitSummary(rows);
    document.getElementById("thead").innerHTML = `<tr>
      <th style="width:140px" onclick="sortBy('tracking')">Tracking # <span class="sa">↕</span></th>
      <th style="width:120px" onclick="sortBy('part')">Part / Ref <span class="sa">↕</span></th>
      <th style="width:100px" onclick="sortBy('shipDate')">Ship date <span class="sa">↕</span></th>
      <th style="width:110px" onclick="sortBy('updated')">Delivered <span class="sa">↕</span></th>
      <th style="width:105px" onclick="sortBy('transitDays')">Transit days <span class="sa">↕</span></th>
      <th style="width:130px" onclick="sortBy('location')">Last location <span class="sa">↕</span></th>
      <th style="width:160px" onclick="sortBy('service')">Service type <span class="sa">↕</span></th>
      <th>Last event</th>
    </tr>`;
    document.getElementById("tbody").innerHTML = rows.map(r => {
      const d = transitDays(r);
      const pc = daysPillClass(d);
      const dLabel = d !== null ? d + " day" + (d===1?"":"s") : "—";
      const trackShort = r.tracking.length > 18 ? r.tracking.slice(0,15)+"…" : r.tracking;
      return `<tr>
        <td><a class="fedex-link" href="${fedexBase}${encodeURIComponent(r.tracking)}" target="_blank" title="${esc(r.tracking)}">${esc(trackShort)}</a></td>
        <td title="${esc(r.part)}">${esc(r.part)}</td>
        <td style="color:var(--muted)">${esc(r.shipDate||"—")}</td>
        <td style="color:var(--muted)">${esc(r.updated||"—")}</td>
        <td><span class="days-pill ${pc}">${dLabel}</span></td>
        <td>${esc(r.location||"—")}</td>
        <td style="color:var(--muted)">${esc(r.service||"—")}</td>
        <td style="color:var(--muted)" title="${esc(r.event)}">${esc(r.event||"—")}</td>
      </tr>`;
    }).join("");
  } else {
    document.getElementById("transit-summary").style.display = "none";
    document.getElementById("thead").innerHTML = `<tr>
      <th style="width:148px" onclick="sortBy('tracking')">Tracking # <span class="sa">↕</span></th>
      <th style="width:130px" onclick="sortBy('part')">Part / Ref <span class="sa">↕</span></th>
      <th style="width:160px" onclick="sortBy('status')">Status <span class="sa">↕</span></th>
      <th style="width:140px" onclick="sortBy('location')">Location <span class="sa">↕</span></th>
      <th>Last event</th>
      <th style="width:110px" onclick="sortBy('eta')">Est. delivery <span class="sa">↕</span></th>
      <th style="width:140px" onclick="sortBy('updated')">Updated <span class="sa">↕</span></th>
    </tr>`;
    document.getElementById("tbody").innerHTML = rows.map(r => {
      const bc = badgeClass(r.status, r.event);
      const trackShort = r.tracking.length > 18 ? r.tracking.slice(0,15)+"…" : r.tracking;
      return `<tr>
        <td><a class="fedex-link" href="${fedexBase}${encodeURIComponent(r.tracking)}" target="_blank" title="${esc(r.tracking)}">${esc(trackShort)}</a></td>
        <td title="${esc(r.part)}">${esc(r.part)}</td>
        <td><span class="badge ${bc}">${esc(r.status||r.event||"—")}</span></td>
        <td>${esc(r.location||"—")}</td>
        <td style="color:var(--muted)" title="${esc(r.event)}">${esc(r.event||"—")}</td>
        <td>${esc(r.eta||"—")}</td>
        <td style="color:var(--hint)">${esc(r.updated||"—")}</td>
      </tr>`;
    }).join("");
  }
}

loadData();
</script>
</body>
</html>
